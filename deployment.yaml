apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app

spec:
  replicas: 3

  selector:
    matchLabels:
       app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:
      - name: flask-container
        image: arsalan87/flask-k8s-project:v1
        ports:
        - containerPort: 5000 
